[color]
fg = #ffeeee
bg = #00000000
fg-alt = #595959
trans = #00000000



[global/wm]
margin-bottom = 0
margin-top = 0



[bar/main]
monitor =
monitor-fallback =
monitor-strict = 
override-redirect = true
bottom = false
fixed-center = true
width = 100%
height = 35
; offset-x = 5%
offset-y = 5
background = ${color.bg}
foreground = ${color.fg}
; radius-top = 5.0
; radius-bottom = 5.0
line-size = 2
line-color = ${color.fg}
padding = 2
module-margin-left = 2
module-margin-right = 2

; icon's font
font-0 = "0xProto\ Nerd\ Font\ Mono:size=13;3"
; label's font
font-1 = "0xProto\ Nerd\ Font\ Mono:size=15;3"

modules-left = network
modules-center = workspaces
modules-right = memory cpu temperature battery datetime
separator = Ņ¬Č
separator-foreground = ${color.fg-alt}
; dim-value = 1.0
wm-name = hyprland
locale = 
; tray-position = center
; tray-detached = false
; tray-maxsize = 16
; tray-background = ${color.bg}
; tray-offset-x = 450
; tray-offset-y = 0
; tray-padding = 0
; tray-scale = 1.0
wm-restack = hyprland
enable-ipc = true
click-left = 
click-middle = 
click-right =
scroll-up =
scroll-down =
double-click-left =
double-click-middle =
double-click-right =
cursor-click = pointer
cursor-scroll = 



[settings]
throttle-output = 5
throttle-output-for = 10
screenchange-reload = false
compositing-background = source
compositing-foreground = over
compositing-overline = over
compositing-underline = over
compositing-border = over
pseudo-transparency = false



